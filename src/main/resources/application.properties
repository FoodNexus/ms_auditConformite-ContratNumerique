server.port=8083

spring.application.name=ms_auditConformite_ContratNumerique

# MySQL — base de données séparée !
spring.datasource.url=jdbc:mysql://localhost:3306/foodnexus_audit?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka — identique pour tous les microservices
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true